<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTV 8.0.0</title>

<style>
body{
    margin:0;
    background:#050914;
    font-family:sans-serif;
    color:white;
    text-align:center;
}

.header{
    background:#0f1628;
    padding:14px;
    font-size:22px;
    color:#4da3ff;
    font-weight:bold;
}

video{
    width:95%;
    max-width:900px;
    margin-top:10px;
    border-radius:12px;
    background:black;
}

.controls{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
}

.control-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    width:100%;
}

input,select{
    padding:10px;
    border-radius:10px;
    border:none;
    min-width:140px;
    max-width:220px;
    background:#0f1c33;
    color:white;
}

.loading{
    color:#9ecbff;
}
</style>
</head>

<body>

<div class="header">GTV V8.0.0</div>

<video id="player" controls autoplay muted></video>

<div class="controls">

    <div class="control-row">
        <select id="countrySelect"></select>
        <input type="text" id="countrySearch" placeholder="🔍 جستجوی کشور">
    </div>

    <div class="control-row">
        <select id="channelSelectDropdown"></select>
        <input type="text" id="channelSearch" placeholder="🔍 جستجوی کانال">
    </div>

    <div id="loading" class="loading"></div>

</div>

// ========= متغیرها =========
const video = document.getElementById("player");
let allCountries = [];
let allChannels = [];
let currentUrl = "";

// ========= ابزار =========
function buildRawUrl(code){
    return `https://raw.githubusercontent.com/iptv-org/iptv/master/streams/${code}.m3u`;
}

// 🔥 سرچ هوشمند
function smartSearch(list, term){

    term = term.toLowerCase().trim();

    return list
        .map(item => {

            const name = (item.name || "").toLowerCase();

            let score = 0;

            if(name.startsWith(term)) score = 3;
            else if(name.includes(term)) score = 2;

            return {...item, score};

        })
        .filter(i => i.score > 0)
        .sort((a,b)=> b.score - a.score);
}

// ========= لود کشور =========
function loadCountries(){

    allCountries = Object.entries(countryMeta).map(([code,info])=>({
        code,
        name:info.name,
        flag:info.flag,
        url:buildRawUrl(code)
    }));

    renderCountries(allCountries);
}

// ========= نمایش کشور =========
function renderCountries(list){

    const sel = document.getElementById("countrySelect");
    sel.innerHTML = "";

    list.forEach(c=>{
        const opt = document.createElement("option");
        opt.value = c.code;
        opt.textContent = `${c.flag} ${c.name}`;
        sel.appendChild(opt);
    });

    if(list.length){
        sel.value = list[0].code;
        loadCountryChannels(list[0].code);
    }
}

// ========= لود کانال =========
async function loadCountryChannels(code){

    const c = allCountries.find(x=>x.code===code);
    const loading = document.getElementById("loading");

    loading.textContent = "در حال لود کانال‌ها...";

    try{
        const res = await fetch(c.url);
        const text = await res.text();

        const lines = text.split("\n");

        const channels=[];
        let title="";

        for(let i=0;i<lines.length;i++){
            let ln = lines[i].trim();

            if(ln.startsWith("#EXTINF")){
                title = ln.split(",")[1] || "";
            }
            else if(ln && !ln.startsWith("#")){
                channels.push({name:title,url:ln});
            }
        }

        allChannels = channels;
        renderChannels(channels);

        loading.textContent = channels.length + " کانال";

    }catch(e){
        loading.textContent = "خطا در لود";
    }
}

// ========= نمایش کانال =========
function renderChannels(list){

    const sel = document.getElementById("channelSelectDropdown");
    sel.innerHTML = "";

    list.forEach(ch=>{
        const opt = document.createElement("option");
        opt.value = ch.url;
        opt.textContent = ch.name || "بدون نام";
        sel.appendChild(opt);
    });

    if(list.length){
        playChannel(list[0].url);
    }
}

// ========= پخش =========
function playChannel(url){

    if(!url) return;

    currentUrl = url;

    video.src = url;
    video.play().catch(()=>{});
}

// ========= EVENT ها =========

// انتخاب کانال
document.getElementById("channelSelectDropdown").onchange = function(){
    playChannel(this.value);
};

// تغییر کشور
document.getElementById("countrySelect").onchange = function(){
    loadCountryChannels(this.value);
};

// 🔥 سرچ کانال
document.getElementById("channelSearch").oninput = function(){

    const term = this.value;

    if(!term){
        renderChannels(allChannels);
        return;
    }

    const result = smartSearch(allChannels, term);
    renderChannels(result);
};

// 🔥 سرچ کشور
document.getElementById("countrySearch").oninput = function(){

    const term = this.value;

    const list = term
        ? smartSearch(allCountries, term)
        : allCountries;

    renderCountries(list);
};

// ========= شروع =========
window.onload = loadCountries;

</script>
