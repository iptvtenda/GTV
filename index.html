<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTV IPTV</title>

<style>
body{
margin:0;
background:#050914;
font-family:sans-serif;
color:white;
text-align:center;
}

.header{
background:#0f1628;
padding:14px;
font-size:22px;
color:#4da3ff;
}

video{
width:95%;
max-width:900px;
margin-top:10px;
border-radius:12px;
background:black;
}

input,select{
padding:10px;
margin:6px;
border-radius:10px;
border:none;
width:85%;
max-width:320px;
background:#0f1c33;
color:white;
}

.channels{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
padding:10px;
}

.channels button{
padding:12px;
border:none;
border-radius:12px;
background:#0f1c33;
color:white;
}

.channels button:hover{
background:#2e6bff;
}

.loading{
margin-top:10px;
color:#9ecbff;
}
</style>
</head>

<body>

<div class="header">BTV IPTV</div>

<video id="player" controls autoplay></video>

<br>

<input type="text" id="countrySearch" placeholder="🔍 جستجوی کشور">
<select id="countrySelect"></select>

<br>

<input type="text" id="channelSearch" placeholder="🔍 جستجوی شبکه">

<div id="loading" class="loading"></div>

<div id="channels" class="channels"></div>

<script>

const video=document.getElementById("player")

let allCountries=[]
let allChannels=[]

// ذخیره
function save(k,v){localStorage.setItem(k,v)}
function load(k){return localStorage.getItem(k)}

// 🚀 لود کشورها (روش پایدار)
function loadCountries(){

setLoading("در حال دریافت کشورها...")

fetch("https://iptv-org.github.io/iptv/index.country.m3u")
.then(res=>res.text())
.then(text=>{

let lines=text.split("\n")
let map={}

lines.forEach(line=>{
if(line.includes('group-title="')){
let name=line.split('group-title="')[1]?.split('"')[0]
if(name) map[name]=true
}
})

allCountries = Object.keys(map).map(name=>({
name,
url:"https://iptv-org.github.io/iptv/countries/"+name.toLowerCase()+".m3u"
}))

buildCountryList(allCountries)

setLoading("")

})
.catch(()=>{
setLoading("❌ خطا در دریافت کشورها")
})

}

// ساخت لیست کشور
function buildCountryList(list){

const select=document.getElementById("countrySelect")
select.innerHTML=""

list.forEach(c=>{
let option=document.createElement("option")
option.value=c.url
option.textContent="🌍 "+c.name
select.appendChild(option)
})

}

// انتخاب کشور
document.getElementById("countrySelect").onchange=function(){
save("country",this.value)
loadChannels(this.value)
}

// سرچ کشور
document.getElementById("countrySearch").oninput=function(){
let v=this.value.toLowerCase()
let f=allCountries.filter(c=>c.name.toLowerCase().includes(v))
buildCountryList(f)
}

// لود شبکه‌ها
function loadChannels(url){

setLoading("در حال دریافت شبکه‌ها...")

fetch(url)
.then(res=>res.text())
.then(text=>{

let lines=text.split("\n")
allChannels=[]
let name=""

lines.forEach(line=>{
if(line.startsWith("#EXTINF")){
name=line.split(",")[1]
}
else if(line.startsWith("http")){
allChannels.push({name,url:line})
}
})

buildChannels(allChannels)
setLoading("")

})

}

// ساخت شبکه‌ها
function buildChannels(list){

let div=document.getElementById("channels")
div.innerHTML=""

list.forEach(ch=>{
let btn=document.createElement("button")
btn.innerText=ch.name

btn.onclick=()=>{
save("channel",ch.url)
play(ch.url)
}

div.appendChild(btn)
})

}

// سرچ شبکه
document.getElementById("channelSearch").oninput=function(){
let v=this.value.toLowerCase()
let f=allChannels.filter(c=>c.name.toLowerCase().includes(v))
buildChannels(f)
}

// پخش
function play(url){
video.src=url
video.play()
}

// لود اولیه
window.onload=function(){
loadCountries()
}

function setLoading(t){
document.getElementById("loading").innerText=t
}

</script>

</body>
</html>
